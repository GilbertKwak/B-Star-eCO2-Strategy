name: B★ eCO₂ Auto Build & Notion Sync

on:
  push:
    branches: [main]
    paths:
      - 'Vol1_Technical/**'
      - 'Vol2_Business/**'
      - 'Vol3_Appendix/**'
      - 'assets/**'
  workflow_dispatch:
    inputs:
      vol:
        description: '빌드할 볼륨 (1, 2, 3, all)'
        required: false
        default: 'all'
      lang:
        description: '언어 (KR, EN, all)'
        required: false
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 강제 적용

jobs:
  build:
    runs-on: ubuntu-latest
    name: DOCX 병합 빌드

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2          # Node.js 24 지원

      - name: Python 환경 설정
        uses: actions/setup-python@v5.6.0      # Node.js 24 지원
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install python-docx requests

      - name: DOCX 병합 빌드
        run: |
          VOL="${{ github.event.inputs.vol || 'all' }}"
          LANG="${{ github.event.inputs.lang || 'all' }}"
          echo "▶ 빌드: Vol=$VOL, Lang=$LANG"
          python scripts/merge_to_docx.py --vol "$VOL" --lang "$LANG" --out output
          echo "✅ DOCX 빌드 완료"
          ls -lh output/ 2>/dev/null || echo "출력 파일 없음 (MD 소스 미존재)"

      - name: Notion 동기화
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          if [ -n "$NOTION_TOKEN" ]; then
            echo "▶ Notion 동기화 시작"
            python scripts/md_to_notion.py
            echo "✅ Notion 동기화 완료"
          else
            echo "⚠️  NOTION_TOKEN 미설정 — Notion 동기화 건너뜀"
          fi

      - name: 빌드 결과 요약
        run: |
          echo "## 📦 빌드 결과" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls output/*.docx 2>/dev/null; then
            echo "| 파일명 | 크기 |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|" >> $GITHUB_STEP_SUMMARY
            ls -lh output/*.docx | awk '{print "| " $NF " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ DOCX 파일 없음 — MD 소스 파일을 Vol1_Technical/ 또는 Vol2_Business/ 에 Push하면 자동 빌드됩니다." >> $GITHUB_STEP_SUMMARY
          fi

      - name: DOCX 아티팩트 업로드
        uses: actions/upload-artifact@v4.6.2   # Node.js 24 지원
        with:
          name: BStar-eCO2-DOCX-v2.0
          path: output/*.docx
          if-no-files-found: warn              # MD 미존재 시 경고만 (에러 X)
          retention-days: 30

      - name: Release 생성 (태그 push 시)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: output/*.docx
          body: |
            ## B★ eCO₂ Strategy Report v2.0
            - Vol.1 기술편 (KR/EN)
            - Vol.2 사업편 (KR/EN)
            - Vol.3 부록편 (KR/EN)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
